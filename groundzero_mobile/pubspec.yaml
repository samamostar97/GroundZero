name: groundzero_mobile
description: GroundZero gym management mobile app for members.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Code generation annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Typography
  google_fonts: ^6.2.1

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Payments
  flutter_stripe: ^11.4.0

  # Shimmer loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generators
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
